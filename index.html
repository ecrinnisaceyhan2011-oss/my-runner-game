<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyAll Simit Runner 🥨</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-size: 20px; text-shadow: 2px 2px 2px black; z-index: 10; pointer-events: none; }
        #gameOver { position: absolute; inset: 0; background: rgba(0,0,0,0.8); color: white; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 20; }
        button { padding: 10px 30px; font-size: 20px; background: #FF9800; border: none; color: white; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">Score: <span id="score">0</span> | Best: <span id="highscore">0</span></div>
    <div id="gameOver">
        <h1>GAME OVER!</h1>
        <p>Score: <span id="finalScore">0</span></p>
        <button onclick="resetGame()">Try Again 🥨</button>
    </div>
    <canvas id="game"></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    
    let width, height, groundY;
    let score = 0;
    let highscore = localStorage.getItem('simitBest') || 0;
    let gameActive = true;

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        groundY = height - 80;
    }
    window.addEventListener('resize', resize);
    resize();

    let player = { x: 50, y: 0, w: 40, h: 60, vy: 0, gravity: 0.7, jump: -15, grounded: false };
    let obstacles = [];
    let simits = [];
    let speed = 6;
    let spawnTimer = 0;

    function jump() {
        if(player.grounded && gameActive) {
            player.vy = player.jump;
            player.grounded = false;
        }
    }

    window.addEventListener('keydown', e => { if(e.code === 'Space') jump(); });
    canvas.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive: false});

    function update() {
        if(!gameActive) return;
        ctx.clearRect(0, 0, width, height);

        // Ground
        ctx.fillStyle = '#4CAF50';
        ctx.fillRect(0, groundY, width, 80);

        // Player
        player.vy += player.gravity;
        player.y += player.vy;
        if(player.y + player.h > groundY) {
            player.y = groundY - player.h;
            player.vy = 0;
            player.grounded = true;
        }
        ctx.fillStyle = '#E91E63';
        ctx.fillRect(player.x, player.y, player.w, player.h);

        // Logic
        spawnTimer++;
        if(spawnTimer > 80) {
            if(Math.random() > 0.5) obstacles.push({x: width, y: groundY-50, w: 30, h: 50});
            else simits.push({x: width, y: groundY-150});
            spawnTimer = 0;
        }

        obstacles.forEach((o, i) => {
            o.x -= speed;
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(o.x, o.y, o.w, o.h);
            if(player.x < o.x + o.w && player.x + player.w > o.x && player.y < o.y + o.h && player.y + player.h > o.y) endGame();
            if(o.x < -50) obstacles.splice(i, 1);
        });

        simits.forEach((s, i) => {
            s.x -= speed;
            ctx.font = '30px Arial';
            ctx.fillText('🥨', s.x, s.y);
            if(Math.hypot(player.x - s.x, player.y - s.y) < 50) {
                score += 10;
                simits.splice(i, 1);
            }
            if(s.x < -50) simits.splice(i, 1);
        });

        score += 0.1;
        document.getElementById('score').textContent = Math.floor(score);
        document.getElementById('highscore').textContent = highscore;
        speed += 0.001;
        requestAnimationFrame(update);
    }

    function endGame() {
        gameActive = false;
        if(score > highscore) {
            highscore = Math.floor(score);
            localStorage.setItem('simitBest', highscore);
        }
        document.getElementById('finalScore').textContent = Math.floor(score);
        document.getElementById('gameOver').style.display = 'flex';
    }

    function resetGame() {
        score = 0; speed = 6; obstacles = []; simits = []; gameActive = true;
        document.getElementById('gameOver').style.display = 'none';
        player.y = 0;
        update();
    }

    update();
</script>
</body>
</html>
