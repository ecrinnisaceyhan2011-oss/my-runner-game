<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atmosphere Runner Pro | Nisa 🥨</title>
    <style>
        :root { --main-pink: #ad1457; --soft-pink: #fce4ec; }
        body {
            margin: 0; padding: 0; overflow: hidden;
            background: #fff5f8; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }
        #game-container {
            position: relative; width: 600px; height: 300px;
            background: white; border-bottom: 4px solid var(--main-pink);
            border-radius: 20px; overflow: hidden; display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #player {
            position: absolute; bottom: 0; left: 50px;
            width: 50px; height: 50px; font-size: 40px;
            display: flex; align-items: center; justify-content: center;
        }
        .obstacle, .reward {
            position: absolute; bottom: 0; width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center; font-size: 30px;
        }
        .reward { bottom: 100px; animation: bounce 0.6s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-15px); } }
        
        #ui-layer {
            position: absolute; top: 15px; left: 20px; right: 20px;
            display: flex; justify-content: space-between;
            font-weight: bold; color: var(--main-pink); font-size: 18px; z-index: 100;
        }
        #selection-screen {
            text-align: center; background: white; padding: 30px;
            border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .char-grid { display: flex; gap: 15px; margin-top: 20px; }
        .char-box {
            padding: 15px; border: 2px solid var(--soft-pink);
            border-radius: 15px; cursor: pointer; transition: 0.2s;
        }
        .char-box:hover { transform: translateY(-5px); background: var(--soft-pink); }
        .char-emoji { font-size: 40px; display: block; }
    </style>
</head>
<body onkeydown="handleInput(event)" onclick="jump()">

    <div id="selection-screen">
        <h2 style="color: var(--main-pink);">Atmosphere Runner ✨</h2>
        <div class="char-grid">
            <div class="char-box" onclick="startGame('🌻')"><span class="char-emoji">🌻</span></div>
            <div class="char-box" onclick="startGame('🌑')"><span class="char-emoji">🌑</span></div>
            <div class="char-box" onclick="startGame('✨')"><span class="char-emoji">✨</span></div>
            <div class="char-box" onclick="startGame('🌠')"><span class="char-emoji">🌠</span></div>
        </div>
        <p style="color: #666; font-size: 14px; margin-top: 15px;">Zıplamak için <b>Boşluk (Space)</b> veya <b>Ekrana Tıkla</b></p>
    </div>

    <div id="game-container">
        <div id="ui-layer">
            <div id="score-text">Skor: 0</div>
            <div id="high-score">En Yüksek: 0</div>
        </div>
        <div id="player">🌻</div>
    </div>

<script>
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');
    const scoreText = document.getElementById('score-text');
    
    let score = 0;
    let gameActive = false;
    let velocity = 0;
    let position = 0;
    let gravity = 0.6; // Yerçekimi sertliği
    let jumpForce = 12; // Zıplama gücü
    let speed = 6;
    let obstacles = [];
    let rewards = [];

    function startGame(emoji) {
        player.innerText = emoji;
        document.getElementById('selection-screen').style.display = 'none';
        container.style.display = 'block';
        gameActive = true;
        requestAnimationFrame(update);
        spawnManager();
    }

    function jump() {
        if (gameActive && position === 0) {
            velocity = jumpForce;
        }
    }

    function handleInput(e) {
        if (e.code === 'Space') {
            e.preventDefault();
            jump();
        }
    }

    function update() {
        if (!gameActive) return;

        // Karakter Fiziği
        position += velocity;
        velocity -= gravity;

        if (position < 0) {
            position = 0;
            velocity = 0;
        }
        player.style.bottom = position + 'px';
